<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helpict — One Door for Wichita</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0f1419;
    color: #f5f5f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.5;
  }

  header {
    padding: 32px 24px 16px;
    text-align: center;
  }

  .logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #f5f5f0;
  }

  .logo span { color: #ffb347; }

  .tagline {
    font-size: 14px;
    color: #8a94a0;
    margin-top: 6px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .prompt {
    font-size: 44px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 48px;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }

  .prompt .verb {
    color: #ffb347;
    font-weight: 700;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .choice {
    background: #1a2029;
    border: 2px solid #2a3340;
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    color: #f5f5f0;
    font-family: inherit;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
  }

  .choice:hover {
    border-color: #ffb347;
    background: #1f2732;
    transform: translateY(-1px);
  }

  .choice:focus-visible {
    outline: none;
    border-color: #ffb347;
    box-shadow: 0 0 0 4px rgba(255, 179, 71, 0.25);
  }

  .choice:active { transform: translateY(0); }

  .icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #0f1419;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }

  .label-group { flex: 1; }

  .label {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .sublabel {
    font-size: 14px;
    color: #8a94a0;
    font-weight: 400;
  }

  .arrow {
    font-size: 24px;
    color: #4a5568;
    transition: color 0.15s, transform 0.15s;
  }

  .choice:hover .arrow {
    color: #ffb347;
    transform: translateX(4px);
  }

  footer {
    padding: 24px;
    text-align: center;
    font-size: 13px;
    color: #6a7280;
  }

  footer a { color: #8a94a0; text-decoration: none; }
  footer a:hover { color: #ffb347; }

  .emergency {
    background: #2a1515;
    border: 1px solid #4a2525;
    color: #ffb4b4;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 32px;
    text-align: center;
  }

  .emergency strong { color: #ff6b6b; }

  @media (max-width: 600px) {
    .prompt { font-size: 32px; margin-bottom: 32px; }
    .label { font-size: 18px; }
    .icon { width: 48px; height: 48px; font-size: 24px; }
    .choice { padding: 20px; gap: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">help<span>ict</span></div>
  <div class="tagline">One door. Wichita.</div>
</header>

<main>
  <div class="emergency">
    In immediate danger? Call <strong>911</strong>. Crisis line: <strong>988</strong>.
  </div>

  <h1 class="prompt">I <span class="verb">am</span>&hellip;</h1>

  <div class="choices">
    <button class="choice" onclick="go('need')">
      <div class="icon">&#9788;</div>
      <div class="label-group">
        <div class="label">in need of help</div>
        <div class="sublabel">Shelter, food, ID, a safe place tonight</div>
      </div>
      <div class="arrow">&rarr;</div>
    </button>

    <button class="choice" onclick="go('case')">
      <div class="icon">&#9873;</div>
      <div class="label-group">
        <div class="label">a case manager</div>
        <div class="sublabel">Find a bed, check a program, refer a client</div>
      </div>
      <div class="arrow">&rarr;</div>
    </button>

    <button class="choice" onclick="go('help')">
      <div class="icon">&hearts;</div>
      <div class="label-group">
        <div class="label">ready to help</div>
        <div class="sublabel">Volunteer, donate, list a property, hire</div>
      </div>
      <div class="arrow">&rarr;</div>
    </button>
  </div>
</main>

<footer>
  A coordinated front door for Wichita's shelter, youth, and housing network.<br>
  <a href="#">About</a> &middot; <a href="#">Partners</a> &middot; <a href="#">Español</a>
</footer>

<script>
  function go(path) {
    const routes = {
      need: 'Intake flow: bed match + document checklist + transport',
      case: 'Case manager dashboard: live bed inventory + handoff tracker',
      help: 'Community flow: landlord listing + volunteer + donate'
    };
    alert('→ ' + routes[path] + '\n\n(Prototype — routing not yet wired.)');
  }
</script>

</body>
</html>
