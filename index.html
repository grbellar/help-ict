<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>help · ICT — Wichita's community front door</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,0..100;1,9..144,400..700,0..100&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf5ea;
    --cream-deep: #f4ecd9;
    --paper: #fffdf7;
    --ink: #2a1f17;
    --ink-soft: #5c4e41;
    --ink-muted: #8e8172;
    --hairline: #ece2cc;
    --sunset: #d9552e;
    --sunset-deep: #b4431f;
    --sunset-glow: #fbe4d4;
    --wheat: #e8a04e;
    --river: #2f5d7a;
    --leaf: #4e7a43;
    --peach: #fce8da;
    --peach-ink: #973318;

    --shadow-soft: 0 1px 2px rgba(42, 31, 23, 0.04), 0 8px 24px -8px rgba(42, 31, 23, 0.08);
    --shadow-lift: 0 2px 4px rgba(42, 31, 23, 0.05), 0 16px 40px -12px rgba(42, 31, 23, 0.14);

    --display: "Fraunces", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --body: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--body);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "ss02";
    position: relative;
  }

  .page {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 100vh;
  }

  header {
    padding: 48px 24px 8px;
    text-align: center;
    animation: rise 0.8s ease-out both;
  }

  .home-link {
    display: inline-block;
    text-decoration: none;
    color: inherit;
  }

  .mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    margin-bottom: 18px;
    color: var(--sunset);
  }

  .mark svg { width: 100%; height: 100%; }

  .logo {
    font-family: var(--display);
    font-size: 34px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
    font-variation-settings: "opsz" 72, "SOFT" 20;
  }

  .logo .dot {
    color: var(--sunset);
    display: inline-block;
    margin: 0 4px;
    transform: translateY(-2px);
    font-weight: 700;
  }

  .logo .ict {
    color: var(--sunset);
    font-weight: 600;
    letter-spacing: 0.005em;
  }

  .tagline {
    font-family: var(--body);
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 24px 56px;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
  }

  .emergency {
    background: var(--peach);
    color: var(--peach-ink);
    padding: 14px 18px;
    border-radius: 10px;
    border-left: 3px solid var(--sunset);
    font-size: 14px;
    margin-bottom: 40px;
    text-align: left;
    font-weight: 500;
    animation: rise 0.8s ease-out 0.1s both;
  }

  .emergency strong {
    font-weight: 700;
    color: var(--sunset-deep);
    letter-spacing: 0.02em;
  }

  .curveball-banner {
    background: #fff0e4;
    color: var(--peach-ink);
    border: 1px solid #f4c9ad;
    padding: 14px 20px;
    border-radius: 16px;
    font-size: 14px;
    margin-bottom: 24px;
    line-height: 1.5;
    box-shadow: var(--shadow-soft);
  }

  .curveball-banner strong {
    color: var(--sunset-deep);
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .prompt {
    font-family: var(--display);
    font-size: clamp(48px, 8vw, 76px);
    font-weight: 400;
    text-align: center;
    margin-bottom: 44px;
    letter-spacing: -0.03em;
    line-height: 1.02;
    color: var(--ink);
    font-variation-settings: "opsz" 144, "SOFT" 20;
    animation: rise 0.9s ease-out 0.2s both;
  }

  .prompt.small {
    font-size: clamp(34px, 5.5vw, 52px);
    line-height: 1.08;
    margin-bottom: 36px;
  }

  .prompt .verb {
    color: var(--sunset);
    font-style: italic;
    font-weight: 500;
    font-variation-settings: "opsz" 144, "SOFT" 30;
  }

  .prompt .dots {
    color: var(--ink-muted);
    font-weight: 300;
  }

  .breadcrumb {
    text-align: center;
    margin-bottom: 18px;
    font-family: var(--body);
    font-size: 13px;
    color: var(--ink-muted);
    letter-spacing: 0.02em;
    animation: rise 0.6s ease-out both;
  }

  .breadcrumb .back {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    padding: 4px 10px;
    border-radius: 999px;
    transition: background 0.2s, color 0.2s;
  }

  .breadcrumb .back:hover {
    background: var(--paper);
    color: var(--sunset);
  }

  .flag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }

  .flag-pill {
    font-family: var(--body);
    font-size: 11.5px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--cream-deep);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .flag-pill.priority {
    background: #fde8d3;
    color: #7a3a0a;
    border: 1px solid #e0a46a;
    font-weight: 600;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .choice {
    background: var(--paper);
    border: none;
    border-radius: 20px;
    padding: 26px 28px;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.25s ease,
                background 0.25s ease;
    text-align: left;
    color: var(--ink);
    font-family: var(--body);
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 22px;
    width: 100%;
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
    animation: rise 0.9s ease-out both;
  }

  .choice:nth-of-type(1) { animation-delay: 0.20s; }
  .choice:nth-of-type(2) { animation-delay: 0.28s; }
  .choice:nth-of-type(3) { animation-delay: 0.36s; }
  .choice:nth-of-type(4) { animation-delay: 0.44s; }
  .choice:nth-of-type(5) { animation-delay: 0.52s; }

  .choice::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: transparent;
    transition: background 0.25s ease;
  }

  .choice:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lift);
    background: #fffefa;
  }

  .choice:hover::before { background: var(--sunset); }

  .choice:focus-visible {
    outline: none;
    box-shadow: var(--shadow-lift), 0 0 0 4px var(--sunset-glow);
  }

  .choice:active { transform: translateY(-1px); }

  .choice-icon {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: var(--sunset-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sunset-deep);
    flex-shrink: 0;
    transition: background 0.25s ease, transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    font-family: var(--display);
    font-size: 20px;
    font-weight: 500;
  }

  .choice-icon svg { width: 24px; height: 24px; }

  .label-group { flex: 1; }

  .label {
    font-family: var(--display);
    font-size: 23px;
    font-weight: 500;
    margin-bottom: 3px;
    letter-spacing: -0.01em;
    color: var(--ink);
    font-variation-settings: "opsz" 36, "SOFT" 20;
  }

  .label em {
    font-style: normal;
    color: inherit;
    font-weight: inherit;
  }

  .sublabel {
    font-family: var(--body);
    font-size: 14.5px;
    color: var(--ink-muted);
    font-weight: 400;
    line-height: 1.45;
  }

  .arrow {
    color: var(--ink-muted);
    transition: color 0.25s, transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    flex-shrink: 0;
  }

  .arrow svg { width: 22px; height: 22px; }

  .choice:hover .arrow { color: var(--sunset); transform: translateX(6px); }

  .endpoint {
    background: var(--paper);
    border-radius: 24px;
    padding: 36px 36px 32px;
    box-shadow: var(--shadow-lift);
    animation: rise 0.7s ease-out both;
  }

  .endpoint .eyebrow {
    font-family: var(--body);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sunset);
    margin-bottom: 10px;
  }

  .endpoint h2 {
    font-family: var(--display);
    font-size: clamp(28px, 4.2vw, 38px);
    font-weight: 500;
    letter-spacing: -0.015em;
    line-height: 1.1;
    margin-bottom: 18px;
    font-variation-settings: "opsz" 60, "SOFT" 20;
  }

  .endpoint .meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px 16px;
    margin-top: 18px;
    font-size: 15px;
  }

  .endpoint .meta dt {
    font-family: var(--body);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding-top: 4px;
  }

  .endpoint .meta dd {
    color: var(--ink);
    font-weight: 500;
  }

  .endpoint .meta dd a {
    color: var(--sunset);
    text-decoration: none;
    font-weight: 600;
  }

  .endpoint .meta dd a:hover { text-decoration: underline; }

  .endpoint .note {
    margin-top: 20px;
    padding: 14px 18px;
    background: var(--cream-deep);
    border-radius: 12px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
  }

  .endpoint .addon {
    margin-top: 14px;
    padding: 14px 18px;
    background: #e8efdc;
    border-radius: 12px;
    font-size: 14px;
    color: var(--leaf);
    font-weight: 500;
  }

  .endpoint .addon strong { color: #3a5c31; }

  .endpoint .partners {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .endpoint .partners a {
    color: var(--river);
    font-weight: 500;
    text-decoration: none;
    font-size: 14.5px;
  }

  .endpoint .partners a:hover { text-decoration: underline; }

  .endpoint .actions {
    margin-top: 28px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .endpoint .actions button,
  .endpoint .actions a {
    font-family: var(--body);
    font-size: 14px;
    font-weight: 600;
    padding: 11px 18px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .endpoint .actions .primary {
    background: var(--sunset);
    color: white;
  }

  .endpoint .actions .primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px -6px rgba(217, 85, 46, 0.5);
  }

  .endpoint .actions .ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--hairline);
  }

  .endpoint .actions .ghost:hover { border-color: var(--sunset); color: var(--sunset); }

  .cm-panel { animation: rise 0.7s ease-out both; }

  .cm-section-label {
    font-family: var(--body);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 12px;
  }

  .cm-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 30px;
  }

  .cm-filter {
    font-family: var(--body);
    font-size: 13.5px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }

  .cm-filter.on {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .cm-inventory { display: flex; flex-direction: column; gap: 10px; }

  .cm-row {
    background: var(--paper);
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: var(--shadow-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .cm-row.disabled { opacity: 0.55; }

  .cm-row-name {
    font-family: var(--display);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .cm-row-sub {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  .cm-status {
    font-family: var(--body);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
  }

  .cm-status.online { background: #e8efdc; color: #3a5c31; }
  .cm-status.offline { background: #fddcdc; color: #8a2020; }
  .cm-status.capacity { background: #fcecc8; color: #8a5a1a; }
  .cm-status.reduced { background: #fcecc8; color: #8a5a1a; }
  .cm-status.surge { background: var(--sunset-glow); color: var(--sunset-deep); }

  .cm-refer {
    font-family: var(--body);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    border: none;
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
  }

  .cm-refer:hover { background: var(--sunset); }
  .cm-refer:disabled { background: var(--hairline); color: var(--ink-muted); cursor: not-allowed; }

  footer {
    padding: 40px 24px 48px;
    text-align: center;
    font-family: var(--body);
    font-size: 13.5px;
    color: var(--ink-muted);
    line-height: 1.7;
    max-width: 560px;
    margin: 0 auto;
    animation: rise 0.9s ease-out 0.7s both;
  }

  footer p {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 16px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  .footer-links { display: inline-flex; gap: 18px; align-items: center; }

  footer a {
    color: var(--ink-soft);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--sunset); }

  footer .dot-sep { color: var(--hairline); font-size: 18px; line-height: 0; }

  .signature {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid var(--hairline);
    font-family: var(--body);
    font-weight: 500;
    font-size: 11.5px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.55;
  }

  .curveball-toggle {
    margin-top: 20px;
    font-size: 11.5px;
    color: var(--ink-muted);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }

  .curveball-toggle button {
    font-family: var(--body);
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--hairline);
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .curveball-toggle button.on {
    background: var(--sunset);
    color: white;
    border-color: var(--sunset);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header { padding: 32px 20px 4px; }
    .logo { font-size: 28px; }
    .prompt { margin-bottom: 32px; }
    .label { font-size: 20px; }
    .choice-icon { width: 46px; height: 46px; border-radius: 13px; }
    .choice { padding: 20px 22px; gap: 16px; }
    main { padding: 24px 20px 40px; }
    footer { padding: 24px 20px 36px; }
    .endpoint { padding: 28px 24px 24px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="page">

<header>
  <a href="#" class="home-link" id="homeLink">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 170 170" fill="currentColor">

</header>

<main id="main"></main>

<footer>
  <p>A coordinated front door for Wichita's shelter, youth, and housing network.</p>
  <div class="footer-links">
    <a href="#" id="footerHome">Home</a>
    <span class="dot-sep">·</span>
    <a href="#">Partners</a>
    <span class="dot-sep">·</span>
    <a href="#">Español</a>
  </div>
  <div class="signature">In partnership with the City of Wichita, United Way of the Plains, and the Coalition to End Homelessness.</div>
  <div class="curveball-toggle">
    <span>demo mode</span>
    <button id="curveballBtn" type="button">Simulate 1pm curveball</button>
  </div>
</footer>

</div>

<script>
/* help.ICT router - loads routing_tree.json, renders deterministically.
   All DOM is constructed with createElement + textContent. No innerHTML of
   user/endpoint data - only static SVG markup through a small helper. */

const state = {
  tree: null,
  curveball: null,
  curveballOn: false,
  currentTreeId: null,
  currentNodeId: null,
  flags: {},
  view: 'home'
};

const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(pathsSpec, viewBox, strokeWidth) {
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', viewBox || '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', strokeWidth || '2');
  svg.setAttribute('stroke-linecap', 'round');
  svg.setAttribute('stroke-linejoin', 'round');
  pathsSpec.forEach(spec => {
    const el = document.createElementNS(SVG_NS, spec.tag);
    Object.entries(spec.attrs).forEach(([k, v]) => el.setAttribute(k, v));
    svg.appendChild(el);
  });
  return svg;
}

const ICON_SPECS = {
  home: { paths: [
    { tag: 'path', attrs: { d: 'M3 11.5 L12 3.5 L21 11.5' } },
    { tag: 'path', attrs: { d: 'M5.5 10 V20 a1 1 0 0 0 1 1 H17.5 a1 1 0 0 0 1 -1 V10' } },
    { tag: 'path', attrs: { d: 'M10 21 V15 a2 2 0 0 1 4 0 V21' } }
  ]},
  person: { paths: [
    { tag: 'circle', attrs: { cx: '12', cy: '8', r: '3.5' } },
    { tag: 'path', attrs: { d: 'M5 21 c 1-4 4-6 7-6 s 6 2 7 6' } }
  ]},
  heart: { paths: [
    { tag: 'path', attrs: { d: 'M12 21 s -7 -4.5 -9 -9 a 5 5 0 0 1 9 -3 a 5 5 0 0 1 9 3 c -2 4.5 -9 9 -9 9 z' } }
  ]},
  arrow: { paths: [
    { tag: 'path', attrs: { d: 'M5 12h14M13 6l6 6-6 6' } }
  ]}
};

function makeIcon(name) {
  return svgEl(ICON_SPECS[name].paths);
}

function el(tag, opts) {
  const node = document.createElement(tag);
  if (!opts) return node;
  if (opts.className) node.className = opts.className;
  if (opts.text !== undefined) node.textContent = opts.text;
  if (opts.attrs) Object.entries(opts.attrs).forEach(([k,v]) => node.setAttribute(k, v));
  if (opts.on) Object.entries(opts.on).forEach(([ev, fn]) => node.addEventListener(ev, fn));
  return node;
}

function clearMain() {
  const m = document.getElementById('main');
  while (m.firstChild) m.removeChild(m.firstChild);
  return m;
}

async function init() {
  try {
    state.tree = await fetch('routing_tree.json').then(r => r.json());
    state.curveball = await fetch('routing_tree_curveball.json').then(r => r.json());
  } catch (e) {
    console.error('Failed to load routing data', e);
    renderError();
    return;
  }
  document.getElementById('homeLink').addEventListener('click', e => { e.preventDefault(); goHome(); });
  document.getElementById('footerHome').addEventListener('click', e => { e.preventDefault(); goHome(); });
  document.getElementById('curveballBtn').addEventListener('click', toggleCurveball);
  renderHome();
}

function goHome() { renderHome(); }

/* --- curveball overlay --- */

function effectiveEndpoint(id) {
  const base = state.tree.endpoints[id];
  if (!base) return null;
  const merged = Object.assign({}, base);
  if (state.curveballOn && state.curveball.endpoint_status_delta[id]) {
    Object.assign(merged, state.curveball.endpoint_status_delta[id]);
  }
  return merged;
}

function isUsable(endpointId) {
  const ep = effectiveEndpoint(endpointId);
  if (!ep) return false;
  return ep.status === 'online' || ep.status === 'surge' || ep.status === 'standby';
}

function resolveLeaf(option) {
  if (!option.leaf) return null;
  if (isUsable(option.leaf)) return option.leaf;
  if (option.fallback && isUsable(option.fallback)) return option.fallback;
  if (option.then_refer && isUsable(option.then_refer)) return option.then_refer;
  return option.leaf;
}

function activeOverrides() {
  if (!state.curveballOn) return [];
  return (state.curveball.override_activations || []).filter(o => o.active);
}

function weatherActive() {
  return state.curveballOn && state.curveball.system_status_delta.weather_emergency_active === true;
}

/* --- top banner (emergency vs curveball) --- */

function appendTopBanner(main) {
  if (state.curveballOn) {
    const banner = el('div', { className: 'curveball-banner' });
    const strong = el('strong', {
      text: (weatherActive() ? 'Severe-weather alert. ' : '') + 'Service disruption. '
    });
    banner.appendChild(strong);
    banner.appendChild(document.createTextNode(state.curveball.system_status_delta.active_alert || ''));
    if (weatherActive()) {
      banner.appendChild(el('br'));
      const span = el('span', {
        text: 'If you need somewhere safe right now, a warming center is closer than any intake step.',
        attrs: { style: 'font-size:13px;' }
      });
      banner.appendChild(span);
    }
    main.appendChild(banner);
  } else {
    const bar = el('div', { className: 'emergency' });
    bar.appendChild(document.createTextNode('In an emergency? Call '));
    bar.appendChild(el('strong', { text: '911' }));
    bar.appendChild(document.createTextNode('. In crisis? Call '));
    bar.appendChild(el('strong', { text: '988' }));
    bar.appendChild(document.createTextNode('.'));
    main.appendChild(bar);
  }
}

function appendBreadcrumb(main) {
  const crumb = el('div', { className: 'breadcrumb' });
  crumb.appendChild(el('button', { className: 'back', text: '\u2190 start over', on: { click: goHome } }));
  const trueFlags = Object.entries(state.flags).filter(([k,v]) => v === true && !k.startsWith('_'));
  if (trueFlags.length || state.flags.foster_history) {
    const row = el('div', { className: 'flag-row' });
    if (state.flags.foster_history) {
      row.appendChild(el('span', { className: 'flag-pill priority', text: 'priority: foster history' }));
    }
    trueFlags.forEach(([k]) => {
      if (k === 'foster_history') return;
      row.appendChild(el('span', { className: 'flag-pill', text: k.replace(/_/g, ' ') }));
    });
    crumb.appendChild(row);
  }
  main.appendChild(crumb);
}

/* --- home --- */

function renderHome() {
  state.currentTreeId = null;
  state.currentNodeId = null;
  state.flags = {};
  state.view = 'home';
  const main = clearMain();
  appendTopBanner(main);

  const h = el('h1', { className: 'prompt' });
  h.appendChild(document.createTextNode('I\u2009'));
  h.appendChild(el('span', { className: 'verb', text: 'am' }));
  h.appendChild(el('span', { className: 'dots', text: '\u2026' }));
  main.appendChild(h);

  const choices = el('div', { className: 'choices' });
  choices.appendChild(buildHomeChoice('home', 'in need', ' of help', 'Shelter, food, ID, a safe place tonight', () => startTree('person_in_need')));
  choices.appendChild(buildHomeChoice('person', 'a case', ' manager', 'Find a bed, check a program, refer a neighbor', () => startTree('case_manager')));
  choices.appendChild(buildHomeChoice('heart', 'ready', ' to help', 'Volunteer, donate, list a property, hire', () => startTree('ready_to_help')));
  main.appendChild(choices);
}

function buildHomeChoice(iconName, emText, trailText, subtext, onClick) {
  const btn = el('button', { className: 'choice', on: { click: onClick } });
  const icon = el('div', { className: 'choice-icon', attrs: { 'aria-hidden': 'true' } });
  icon.appendChild(makeIcon(iconName));
  btn.appendChild(icon);
  const lg = el('div', { className: 'label-group' });
  const label = el('div', { className: 'label' });
  label.appendChild(el('em', { text: emText }));
  label.appendChild(document.createTextNode(trailText));
  lg.appendChild(label);
  lg.appendChild(el('div', { className: 'sublabel', text: subtext }));
  btn.appendChild(lg);
  const arrow = el('div', { className: 'arrow', attrs: { 'aria-hidden': 'true' } });
  arrow.appendChild(makeIcon('arrow'));
  btn.appendChild(arrow);
  return btn;
}

/* --- tree entry --- */

function startTree(treeId) {
  const tree = state.tree.trees[treeId];
  if (!tree) return;
  state.currentTreeId = treeId;
  state.flags = {};
  if (tree.type === 'filter_ui') { renderCaseManager(); return; }
  renderNode(treeId, tree.root);
}

/* --- node renderer --- */

function renderNode(treeId, nodeId) {
  const tree = state.tree.trees[treeId];
  const node = tree.nodes[nodeId];
  if (!node) { renderHome(); return; }
  state.currentTreeId = treeId;
  state.currentNodeId = nodeId;
  state.view = 'node';

  if (node.type === 'computed') {
    const now = new Date();
    const hour = now.getHours();
    const isWeekday = now.getDay() >= 1 && now.getDay() <= 5;
    const daytime = isWeekday && hour >= 7 && hour < 17;
    const branch = node.branches.find(b =>
      (b.when === '07:00-17:00_weekday' && daytime) ||
      (b.when === 'otherwise' && !daytime)
    ) || node.branches[node.branches.length - 1];
    const leafId = isUsable(branch.leaf) ? branch.leaf : (branch.fallback || branch.leaf);
    renderLeaf(leafId);
    return;
  }

  let options = node.options.map(o => Object.assign({}, o));
  if (state.curveballOn) {
    const yo = activeOverrides().find(o => o.id === 'override_youth_emergency_placement');
    if (yo && (yo.applies_to_nodes || []).includes(nodeId)) {
      options = options.map(o => {
        if (o.leaf === 'bridges') {
          return Object.assign({}, o, {
            leaf: yo.new_leaf_logic.primary,
            _addon: yo.new_leaf_logic.addon,
            _escalation: yo.new_leaf_logic.escalation
          });
        }
        return o;
      });
    }
  }

  const main = clearMain();
  appendTopBanner(main);
  appendBreadcrumb(main);
  main.appendChild(el('h1', { className: 'prompt small', text: node.prompt }));

  const choicesBox = el('div', { className: 'choices' });
  options.forEach((opt, i) => choicesBox.appendChild(buildOptionButton(opt, i)));
  main.appendChild(choicesBox);
}

function buildOptionButton(opt, i) {
  const btn = el('button', { className: 'choice', on: { click: () => chooseOption(opt) } });
  const icon = el('div', { className: 'choice-icon', text: String.fromCharCode(65 + i), attrs: { 'aria-hidden': 'true' } });
  btn.appendChild(icon);
  const lg = el('div', { className: 'label-group' });
  lg.appendChild(el('div', { className: 'label', text: opt.label }));
  if (opt._escalation) lg.appendChild(el('div', { className: 'sublabel', text: opt._escalation }));
  btn.appendChild(lg);
  const arrow = el('div', { className: 'arrow', attrs: { 'aria-hidden': 'true' } });
  arrow.appendChild(makeIcon('arrow'));
  btn.appendChild(arrow);
  return btn;
}

function chooseOption(opt) {
  if (opt.set_flag) Object.assign(state.flags, opt.set_flag);
  if (opt._addon) state.flags._addon = opt._addon;
  if (state.flags.dv_flag) { renderLeaf('dv_handoff'); return; }
  if (opt.redirect_tree) { startTree(opt.redirect_tree); return; }
  if (opt.action) { renderAction(opt); return; }
  if (opt.next) { renderNode(state.currentTreeId, opt.next); return; }
  if (opt.leaf) { renderLeaf(resolveLeaf(opt)); return; }
}

/* --- action nodes --- */

function renderAction(opt) {
  state.view = 'leaf';
  const main = clearMain();
  appendTopBanner(main);
  appendBreadcrumb(main);
  const card = el('div', { className: 'endpoint' });
  card.appendChild(el('div', { className: 'eyebrow', text: 'Next step' }));
  if (opt.action === 'share_person_in_need_link') {
    card.appendChild(el('h2', { text: 'Send them this link' }));
    card.appendChild(el('p', {
      text: 'Text or share this page so they can start the flow themselves. Their answers stay private - we don\u2019t store anything until they choose to reach out.',
      attrs: { style: 'margin-bottom:14px;' }
    }));
    card.appendChild(el('div', {
      text: 'helpict.org/start',
      attrs: { style: 'background:var(--cream-deep);padding:14px 18px;border-radius:12px;font-family:var(--body);font-size:14px;word-break:break-all;' }
    }));
  } else if (opt.action === 'call_911_request_hot') {
    card.appendChild(el('h2', { text: 'Call 911' }));
    const p1 = el('p', { attrs: { style: 'margin-bottom:10px;' } });
    p1.appendChild(document.createTextNode('Ask dispatch to send '));
    p1.appendChild(el('strong', { text: 'H.O.T.' }));
    p1.appendChild(document.createTextNode(' - Wichita\u2019s Homeless Outreach Team. They are trained officers who will de-escalate and connect to shelter.'));
    card.appendChild(p1);
    const p2 = el('p', { attrs: { style: 'color:var(--ink-muted);font-size:14px;' } });
    p2.appendChild(document.createTextNode('Direct line if not in immediate danger: '));
    p2.appendChild(el('strong', { text: '316-854-3013' }));
    p2.appendChild(document.createTextNode('.'));
    card.appendChild(p2);
  }
  const actions = el('div', { className: 'actions' });
  actions.appendChild(el('button', { className: 'ghost', text: 'Start over', on: { click: goHome } }));
  card.appendChild(actions);
  main.appendChild(card);
}

/* --- leaf / endpoint --- */

function renderLeaf(endpointId) {
  state.view = 'leaf';
  const ep = effectiveEndpoint(endpointId);
  if (!ep) { renderHome(); return; }
  const main = clearMain();
  appendTopBanner(main);
  appendBreadcrumb(main);

  const card = el('div', { className: 'endpoint' });
  card.appendChild(el('div', {
    className: 'eyebrow',
    text: ep.role === 'aggregator' ? 'Your options' : 'Start here'
  }));
  card.appendChild(el('h2', { text: ep.name }));

  if (ep.note) card.appendChild(el('div', { className: 'note', text: ep.note }));

  if (ep.status === 'offline') {
    const note = el('div', { className: 'note' });
    note.appendChild(el('strong', { text: 'Heads up: ' }));
    note.appendChild(document.createTextNode(ep.name + ' is temporarily offline' + (ep.offline_reason ? ' (' + ep.offline_reason.replace(/_/g,' ') + ')' : '') + '. We rerouted you to the next-best option.'));
    card.appendChild(note);
  } else if (ep.status === 'at_capacity') {
    const note = el('div', { className: 'note' });
    note.appendChild(el('strong', { text: 'Heads up: ' }));
    note.appendChild(document.createTextNode(ep.name + ' is at capacity. We attached you to the waitlist and found the next-best option.'));
    card.appendChild(note);
  }

  const metaList = buildMetaList(ep);
  if (metaList) card.appendChild(metaList);

  if (ep.partners) {
    const partners = el('div', { className: 'partners' });
    ep.partners.forEach(p => {
      const a = el('a', { text: p.name + ' \u2192', attrs: { href: p.url ? 'https://' + p.url : '#', target: '_blank', rel: 'noopener' } });
      partners.appendChild(a);
    });
    card.appendChild(partners);
  }
  if (ep.locations) {
    const locs = el('div', { className: 'partners' });
    ep.locations.forEach(l => {
      locs.appendChild(el('div', { text: l.name + (l.address ? ' \u00b7 ' + l.address : '') }));
    });
    card.appendChild(locs);
  }

  if (state.flags._addon === 'dcf_il_emergency_placement_ticket') {
    const addon = el('div', { className: 'addon' });
    addon.appendChild(el('strong', { text: 'Auto-filed: ' }));
    addon.appendChild(document.createTextNode('DCF emergency placement ticket. DCF expects shelter presentation within 72 hours. Your case manager will see this on the referral.'));
    card.appendChild(addon);
  }

  const actions = el('div', { className: 'actions' });
  if (ep.phone) {
    const a = el('a', { className: 'primary', text: 'Call ' + ep.phone, attrs: { href: 'tel:' + ep.phone.replace(/[^0-9+]/g,'') } });
    actions.appendChild(a);
  }
  if (ep.address) {
    const a = el('a', { className: 'ghost', text: 'Directions', attrs: { href: 'https://maps.google.com/?q=' + encodeURIComponent(ep.address), target: '_blank', rel: 'noopener' } });
    actions.appendChild(a);
  }
  actions.appendChild(el('button', { className: 'ghost', text: 'Start over', on: { click: goHome } }));
  card.appendChild(actions);

  main.appendChild(card);
}

function buildMetaList(ep) {
  const rows = [];
  if (ep.address) rows.push({ k: 'Address', text: ep.address });
  if (ep.hours) rows.push({ k: 'Hours', text: ep.hours });
  if (ep.hours_today) rows.push({ k: 'Today', text: ep.hours_today });
  if (ep.queue_minutes) rows.push({ k: 'Wait', text: '~' + ep.queue_minutes + ' min' });
  if (ep.phone) rows.push({ k: 'Phone', link: { text: ep.phone, href: 'tel:' + ep.phone.replace(/[^0-9+]/g,'') } });
  if (ep.crisis_line) rows.push({ k: '24h line', link: { text: ep.crisis_line, href: 'tel:' + ep.crisis_line.replace(/[^0-9+]/g,'') } });
  if (ep.email) rows.push({ k: 'Email', link: { text: ep.email, href: 'mailto:' + ep.email } });
  if (ep.url) rows.push({ k: 'Web', link: { text: ep.url, href: 'https://' + ep.url, target: '_blank' } });
  if (ep.bring && ep.bring[0] !== 'none_required') rows.push({ k: 'Bring', text: ep.bring.join(', ') });
  if (!rows.length) return null;
  const dl = el('dl', { className: 'meta' });
  rows.forEach(r => {
    dl.appendChild(el('dt', { text: r.k }));
    const dd = el('dd');
    if (r.link) {
      const a = el('a', { text: r.link.text, attrs: { href: r.link.href } });
      if (r.link.target) { a.setAttribute('target', r.link.target); a.setAttribute('rel', 'noopener'); }
      dd.appendChild(a);
    } else {
      dd.textContent = r.text;
    }
    dl.appendChild(dd);
  });
  return dl;
}

/* --- case manager console --- */

const CM_FILTERS = [
  { key: 'age_youth', label: 'Youth (under 25)' },
  { key: 'foster_history', label: 'Foster history' },
  { key: 'with_kids', label: 'With kids' },
  { key: 'has_voucher', label: 'Has voucher' },
  { key: 'needs_bed_tonight', label: 'Bed tonight' },
  { key: 'pregnant_parenting', label: 'Pregnant / parenting' },
  { key: 'dv_flag', label: 'DV' }
];
const cmFilterState = {};

function renderCaseManager() {
  state.view = 'filter_ui';
  state.currentTreeId = 'case_manager';
  const main = clearMain();

  if (state.curveballOn) {
    const banner = el('div', { className: 'curveball-banner' });
    banner.appendChild(el('strong', { text: 'Triple-disruption protocol active. ' }));
    banner.appendChild(document.createTextNode(state.curveball.case_manager_ui_changes.live_inventory_badges.join(' \u00b7 ')));
    main.appendChild(banner);
  } else {
    appendTopBanner(main);
  }
  appendBreadcrumb(main);

  const title = el('h1', { className: 'prompt small', attrs: { style: 'text-align:left;' } });
  title.appendChild(document.createTextNode('Case manager '));
  title.appendChild(el('em', { text: 'console', attrs: { style: 'font-style:italic;color:var(--sunset);' } }));
  main.appendChild(title);

  const panel = el('div', { className: 'cm-panel' });
  panel.appendChild(el('div', { className: 'cm-section-label', text: 'Filter by client' }));

  const filters = el('div', { className: 'cm-filters' });
  CM_FILTERS.forEach(f => {
    const b = el('button', {
      className: 'cm-filter' + (cmFilterState[f.key] ? ' on' : ''),
      text: f.label,
      on: { click: () => { cmFilterState[f.key] = !cmFilterState[f.key]; renderCaseManager(); } }
    });
    filters.appendChild(b);
  });
  panel.appendChild(filters);

  panel.appendChild(el('div', { className: 'cm-section-label', text: 'Live inventory' }));

  const inv = el('div', { className: 'cm-inventory' });
  const shown = ['crossroads_dropin','bridges','open_door','second_light','center_of_hope','nextenant','hot_team','safe_place_line','rapid_rehousing_intake','dcf_il'];
  shown.forEach(id => {
    const ep = effectiveEndpoint(id);
    if (!ep) return;
    inv.appendChild(buildCmRow(ep));
  });
  panel.appendChild(inv);
  main.appendChild(panel);
}

function buildCmRow(ep) {
  const cap = ep.capacity_override || ep.capacity || {};
  const bits = [];
  if (cap.beds_open !== undefined && cap.beds_open !== null) bits.push(cap.beds_open + ' beds open');
  if (cap.units_available !== undefined) bits.push(cap.units_available + ' units');
  if (cap.slots_open !== undefined) bits.push(cap.slots_open + ' slots');
  if (cap.surge_beds_added) bits.push('+' + cap.surge_beds_added + ' surge');
  if (cap.waitlist) bits.push(cap.waitlist + '-person waitlist');
  if (ep.queue_minutes) bits.push('~' + ep.queue_minutes + ' min wait');
  if (ep.offline_reason) bits.push(ep.offline_reason.replace(/_/g,' '));

  const statusClass =
      ep.status === 'offline' ? 'offline'
    : ep.status === 'at_capacity' ? 'capacity'
    : ep.status === 'at_capacity_soon' ? 'capacity'
    : ep.status === 'reduced_hours' ? 'reduced'
    : ep.status === 'surge' ? 'surge'
    : 'online';
  const offline = ep.status === 'offline' || ep.status === 'at_capacity';

  const row = el('div', { className: 'cm-row' + (offline ? ' disabled' : '') });

  const left = el('div');
  left.appendChild(el('div', { className: 'cm-row-name', text: ep.name }));
  left.appendChild(el('div', { className: 'cm-row-sub', text: bits.join(' \u00b7 ') || 'available' }));
  row.appendChild(left);

  row.appendChild(el('span', { className: 'cm-status ' + statusClass, text: (ep.status || 'online').replace(/_/g, ' ') }));

  const refer = el('button', {
    className: 'cm-refer',
    text: 'Refer \u2192',
    attrs: offline ? { disabled: 'disabled' } : {},
    on: { click: () => alert('Pre-filled referral queued to ' + ep.name + '.') }
  });
  row.appendChild(refer);

  return row;
}

/* --- curveball toggle --- */

function toggleCurveball() {
  state.curveballOn = !state.curveballOn;
  const btn = document.getElementById('curveballBtn');
  btn.classList.toggle('on', state.curveballOn);
  btn.textContent = state.curveballOn ? 'Curveball: ON' : 'Simulate 1pm curveball';
  if (state.view === 'home' || !state.view) renderHome();
  else if (state.view === 'filter_ui') renderCaseManager();
  else if (state.view === 'node') renderNode(state.currentTreeId, state.currentNodeId);
  else renderHome();
}

/* --- error --- */

function renderError() {
  const main = clearMain();
  const card = el('div', { className: 'endpoint' });
  card.appendChild(el('div', { className: 'eyebrow', text: 'Problem' }));
  card.appendChild(el('h2', { text: 'Couldn\u2019t load routing data' }));
  card.appendChild(el('div', {
    className: 'note',
    text: 'This page needs routing_tree.json and routing_tree_curveball.json served from the same directory. Run: python3 -m http.server, then open http://localhost:8000'
  }));
  main.appendChild(card);
}

init();
</script>
